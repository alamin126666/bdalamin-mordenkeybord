name: 🔨 Build ModernKey APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 📦 Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 🔐 Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: 🛠️ Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: 📊 Run Unit Tests
        run: ./gradlew test --no-daemon
        continue-on-error: true

      - name: 📤 Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ModernKey-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

      - name: 📋 Build Summary
        run: |
          echo "## ✅ Build Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| APK | ModernKey-debug-${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          APK_SIZE=$(du -h app/build/outputs/apk/debug/*.apk 2>/dev/null | cut -f1 || echo "N/A")
          echo "| APK Size | $APK_SIZE |" >> $GITHUB_STEP_SUMMARY

  release:
    name: Build Release APK
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🔐 Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: 🏗️ Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: 📤 Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: ModernKey-release-${{ github.ref_name }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90
